<!DOCTYPE HTML>

<html><head>

<link rel="shortcut icon" type="image/x-icon" href="icon_CcH_icon.ico">
  
  <title>Tim Hradil</title>
  
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body, html {
  height: 100%;
  margin: 0;
}
  
.bg {
  overflow: hidden;
  clip:auto;
  height: 100%;
  background-image: url('beach filter.png');
  
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  
  text-align: center;
}
.overlay {
  height: 0;
  width: 100%;
  position: absolute;
  z-index: 2;
  top: 0;
  left: 0;
  background-color: rgb(0,0,0);
  background-color: rgba(0,0,0, 0.9);
  overflow-x: hidden;
  transition: 0.5s;
}
.overlay-content {
  position: relative;
  top: 25%;
  width: 100%;
  text-align: center;
  margin-top: 30px;
}
.overlay a {
  padding: 8px;
  text-decoration: none;
  font-size: 36px;
  color: #818181;
  display: block;
  transition: 0.3s;
}
.overlay a:hover, .overlay a:focus {
  color: #f1f1f1;
}
.overlay .closebtn {
  position: absolute;
  top: 20px;
  right: 45px;
  font-size: 60px;
}
@media screen and (max-height: 450px) {
  .overlay a {font-size: 20px}
  .overlay .closebtn {
  font-size: 40px;
  top: 15px;
  right: 35px;
  }
}
  
</style>

</head>

<body>

  <div id="myNav" class="overlay" style="height: 0%;">
  <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">×</a>
  <div class="overlay-content">
    <a href="about-me">About Me</a>
    <a href="Timothy Hradil Resume.pdf" target="_blank">Resume</a>
    <a href="projects">Projects</a>
    <a href="work-in-progress">Blog</a>
    <a href="contact-me">Contact Me</a>
  </div>
  </div>  
  
  <div class="bg">
    <span style="font-size:calc(40px + 1vmax);cursor:pointer;color:white;position:absolute;z-index:1;left:50%;margin-right: -50%;transform: translate(-50%, 0);top:0px;" onclick="openNav()">☰</span>
    <img src="title_page_transparent.png" style="max-height:100vh;max-width:100vmax;position:relative;transform:translate(-50vmax,-50%);left:50vw;top:50%">
  </div>
    
  <script>
  function openNav() {
    document.getElementById("myNav").style.height = "100%";
  }
  function closeNav() {
    document.getElementById("myNav").style.height = "0%";
  }
    
</script>
  






</body></html>
