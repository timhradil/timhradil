
<!DOCTYPE HTML>

<html><head>

<link rel="shortcut icon" type="image/x-icon" href="icon_CcH_icon.ico">
  
  <title>Tim Hradil</title>
  
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<base href="https://timhradil.com/">
  
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/css/bootstrap.min.css">
  
<style>
body, html {
  height: 100%;
  margin: 0;
}
  
.bg {
  overflow: hidden;
  clip:auto;
  height: 100%;

  background-image: url('beach filter.png');
  
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  
  text-align: center;
}

.overlay {
  height: 0px;
  width: 100%;
  position: absolute;
  z-index: 2;
  top: 0;
  left: 0;
  background-color: rgb(0,0,0);
  background-color: rgba(0,0,0, 0.9);
  overflow-x: hidden;
  transition: 0.5s;
}
.overlay-content {
  position: relative;
  top: 25%;
  width: 100%;
  text-align: center;
  margin-top: 30px;
}
.overlay a {
  padding: 8px;
  text-decoration: none;
  font-size: 36px;
  color: #818181;
  display: block;
  transition: 0.3s;
}
.overlay a:hover, .overlay a:focus, .dropdown-content a:hover, .dropdown .dropbtn:hover {
  color: #f1f1f1;
}
.overlay .closebtn {
  position: absolute;
  top: 20px;
  right: 45px;
  font-size: 60px;
}
  
.dropdown {
  position: relative;
  background-color: inherit;
}

.dropdown .dropbtn {
  padding: 8px;
  text-decoration: none;
  font-size: 36px;
  color: #818181;
  display: block;
  transition: 0.3s;
  background-color: inherit;
  font-family: inherit;
  border: none;
  outline: none;
  margin: auto;
}
  
.dropdown-content {
  visibility: hidden;
  height:0;
  position: relative;
  background-color: inherit;
  z-index: 1;
  width: 100%;
  transition: all 0.3s ease-in-out 0s, visibility 0s linear 0.3s, z-index 0s linear 0.01s;
  opacity: 0;
  transform: translateY(-2em);
}

.dropdown-content a {
  padding: 4px;
  text-decoration: none;
  font-size: 18px;
  color: #818181;
  display: block;
  transition: 0.3s;
  font-family: inherit;
  background-color: inherit;
}
.dropdown:focus .dropdown-content,
.dropdown:focus-within .dropdown-content,
.dropdown:hover .dropdown-content {
  visibility: visible;
  height: 60px;
  opacity: 1;
  z-index: 3;
  transform: translateY(0%);
  transition-delay: 0s, 0s, 0.3s; 
}

@media screen and (max-height: 450px) {
  .overlay a {font-size: 20px}
  .overlay .closebtn {
  font-size: 40px;
  top: 15px;
  right: 35px;
  }
}
  
</style>

</head>

<body>

  <div id="myNav" class="overlay" style="height: 0%;">
  <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">×</a>
  <div class="overlay-content">
    <div class="dropdown">
      <a href="about-me" class="dropbtn">About Me</a>
      <div id="dc" class="dropdown-content">
        <a href="about-me/artwork">Artwork</a>
        <a href="personal_blog">Personal Blog</a>
      </div>
    </div>
    <a href="Timothy Hradil Resume.pdf" target="_blank">Resume</a>
    <a href="projects">Projects</a>
    <a href="blog">Blog</a>
    <a href="contact-me">Contact Me</a>
  </div>
  </div>  
  
  <div class="bg">
    <span style="font-size:calc(40px + 1vmax);cursor:pointer;color:white;position:absolute;z-index:1;left:50%;margin-right: -50%;transform: translate(-50%, 0);top:0px;" onclick="openNav()">☰</span>
    <img src="wip_image_transparent.png" style="max-height:100vh;max-width:100vmax;position:relative;transform:translate(-50vmax,-50%);left:50vw;top:50%">
  </div>
    
  <script>
  function openNav() {
      document.getElementById("myNav").style.height = "100%";
      onOpen();
    }
    function closeNav() {
      document.getElementById("myNav").style.height = "0%";
    }
  
    function isMobileDevice() {
      return (typeof window.orientation !== "undefined") || (navigator.userAgent.indexOf('IEMobile') !== -1);
    }
    
    if (isMobileDevice()){
      document.getElementById("dc").style.visibility = "visible";
      document.getElementById("dc").style.height = "60px";
      document.getElementById("dc").style.transform = "translateY(0%)";
      document.getElementById("dc").style.opacity = "1";    
    }
    closeNav();
    
</script>
  






</body></html>
